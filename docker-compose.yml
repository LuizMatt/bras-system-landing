services:
  landing:
    build:
      context: .
      args:
        - NUXT_PUBLIC_API_BASE=${API_BASE:-http://localhost:3000/api}
        - NUXT_PUBLIC_UPLOADS_BASE=${UPLOADS_BASE:-http://localhost:3000}
    restart: unless-stopped
    ports:
      - "${PORT:-3002}:3000"
    environment:
      - NUXT_PUBLIC_API_BASE=${API_BASE}
      - NUXT_PUBLIC_UPLOADS_BASE=${UPLOADS_BASE}
